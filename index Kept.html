<style>
  :root{
    --ink:#14161A; --ink-2:#1B1E24; --ink-3:#23262E;
    --line:#31353F; --line-soft:#282C35;
    --paper:#EDE8E0; --paper-dim:#A8A29A; --paper-faint:#6B665E;
    --accent:#8FA382; --accent-deep:#5F7A56;
    --danger:#C0705C;
    --radius:14px; --radius-sm:10px; --tap:46px;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
    --serif:ui-serif,Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--ink);color:var(--paper);font-family:var(--sans);overscroll-behavior:none}
  .hidden{display:none!important}
  .wrap{padding:14px 16px calc(var(--safe-b) + 90px)}
  .topbar{
    display:flex;align-items:center;gap:10px;
    padding:calc(var(--safe-t) + 14px) 16px 12px;
    position:sticky;top:0;background:var(--ink);z-index:10;
  }
  .grow{flex:1;min-width:0}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--paper-faint)}
  h1{font-family:var(--serif);font-size:22px;font-weight:600;margin:2px 0 0}
  .icon-btn{
    width:var(--tap);height:var(--tap);border:none;border-radius:50%;
    background:var(--ink-2);color:var(--paper);display:grid;place-items:center;flex:none;
  }
  .icon-btn svg{width:21px;height:21px}
  .icon-btn:active{transform:scale(.94)}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .muted{color:var(--paper-dim)}

  .people-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
  .p-card{background:var(--ink-3);border-radius:var(--radius);overflow:hidden;border:1px solid var(--line-soft)}
  .p-cover{aspect-ratio:1;background:var(--ink-2) center/cover no-repeat;display:grid;place-items:center;color:var(--paper-faint)}
  .p-cover svg{width:34px;height:34px}
  .p-body{padding:10px 12px 12px}
  .p-name{font-family:var(--serif);font-size:16px}
  .p-sub{font-size:12px;color:var(--paper-faint);margin-top:2px}

  .card{background:var(--ink-3);border:1px solid var(--line-soft);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .sec-head{display:flex;align-items:baseline;gap:10px;margin:20px 0 10px}
  .sec-head .label{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--paper-dim);white-space:nowrap}
  .sec-head .rule{flex:1;height:1px;background:var(--line)}

  .btn{
    -webkit-appearance:none;appearance:none;border:none;border-radius:var(--radius-sm);
    background:var(--ink-2);color:var(--paper);font-size:15px;font-weight:600;
    padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:8px;
    min-height:var(--tap);cursor:pointer;text-decoration:none;
  }
  .btn:active{transform:translateY(1px)}
  .btn.block{width:100%}
  .btn.sm{padding:8px 12px;font-size:13px;min-height:36px}
  .btn.primary{background:var(--accent);color:#14201A}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .btn svg{width:18px;height:18px}

  .empty{padding:60px 30px;text-align:center;color:var(--paper-faint)}
  .empty svg{width:38px;height:38px;color:var(--line);margin-bottom:14px}
  .empty .t{color:var(--paper);font-family:var(--serif);font-size:17px;margin-bottom:6px}

  .fab{
    position:fixed;right:18px;bottom:calc(var(--safe-b) + 18px);z-index:20;
    width:58px;height:58px;border-radius:50%;border:none;background:var(--accent);color:#14201A;
    display:grid;place-items:center;box-shadow:0 6px 18px rgba(0,0,0,.4);
  }
  .fab svg{width:26px;height:26px}
  .fab:active{transform:scale(.95)}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-end}
  .sheet{
    background:var(--ink-2);width:100%;max-height:88vh;overflow-y:auto;
    border-radius:20px 20px 0 0;padding:10px 18px calc(var(--safe-b) + 22px);
  }
  .grab{width:36px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 14px}
  .sheet h2{font-family:var(--serif);font-size:20px;margin:0 0 14px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--paper-faint);margin-bottom:6px}
  .input{
    width:100%;background:var(--ink-3);border:1px solid var(--line);color:var(--paper);
    border-radius:var(--radius-sm);padding:12px 13px;font-size:15px;font-family:inherit;
  }
  textarea.input{resize:vertical;min-height:80px}

  #toast{
    position:fixed;left:50%;bottom:calc(var(--safe-b) + 24px);transform:translateX(-50%);
    background:var(--paper);color:var(--ink);padding:10px 18px;border-radius:30px;
    font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .25s;z-index:80;
  }
  #toast.show{opacity:1}

  .person-cover{width:100%;aspect-ratio:1;border-radius:var(--radius);background:var(--ink-2) center/cover no-repeat;display:grid;place-items:center;color:var(--paper-faint);margin-bottom:14px}
  .person-cover svg{width:44px;height:44px}
  .person-name{font-family:var(--serif);font-size:26px;text-align:center}
  .person-rel{text-align:center;color:var(--paper-dim);font-size:14px;margin-top:2px}
  .person-note{text-align:center;font-style:italic;color:var(--paper-dim);font-size:14.5px;line-height:1.6;margin:14px auto 4px;max-width:320px}

  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .photo-add{aspect-ratio:1;border:1.5px dashed var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--paper-dim)}
  .photo-add svg{width:22px;height:22px}
  .row{display:flex;align-items:center;gap:12px}
  .mono{font-family:var(--mono)}
  .chev{display:inline-flex;flex:none;color:var(--paper-faint)}
  .chev svg{width:18px;height:18px;display:block}
  .photo-add span{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase}
  .ph{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--ink-2) center/cover no-repeat}
  .ph .x{position:absolute;top:4px;right:4px;width:24px;height:24px;border:none;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center}
  .ph .x svg{width:13px;height:13px}

  .memory{background:var(--ink-3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;border:1px solid var(--line-soft)}
  .memory-text{font-size:14.5px;line-height:1.55;white-space:pre-wrap}
  .memory-date{font-family:var(--mono);font-size:10.5px;color:var(--paper-faint);margin-top:8px}
  .memory-ph{width:100%;border-radius:8px;margin-top:8px;display:block;background:var(--ink-2) center/cover no-repeat;aspect-ratio:16/10}

  #viewer{position:fixed;inset:0;z-index:70;background:rgba(6,8,10,.97);display:flex;flex-direction:column}
  #viewer .v-top{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-t) + 10px) 14px}
  #viewer .icon-btn{background:rgba(255,255,255,.1)}
  #viewer .v-actions{display:flex;gap:8px}
  #viewer .v-count{font-family:var(--mono);font-size:12px;color:var(--paper-dim);letter-spacing:.06em}
  #viewer .v-stage{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:none}
  #viewer .v-stage img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none;will-change:transform;transform:translate(0px,0px) scale(1)}
  #viewer .v-hint{text-align:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--paper-faint);padding:8px 0 calc(var(--safe-b) + 10px)}

  #lock{position:fixed;inset:0;background:var(--ink);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  #lock .mark{color:var(--accent);margin-bottom:22px}
  #lock .mark svg{width:48px;height:48px}
  #lock input{width:200px;text-align:center;letter-spacing:.5em;font-size:22px;padding:14px 10px}
  #lock .err{color:var(--danger);font-size:13px;margin-top:10px;height:16px}

  #install-banner{
    position:fixed;left:12px;right:12px;bottom:calc(var(--safe-b) + 14px);z-index:40;
    background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 10px 12px 16px;display:flex;align-items:center;gap:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
  }
  #install-banner .txt{flex:1;font-size:13px;line-height:1.4;color:var(--paper-dim)}
  #install-banner .txt b{color:var(--paper);display:block;font-family:var(--serif);font-size:15px;margin-bottom:2px}
</style>
</head>
<body>
<div id="lock" class="hidden">

<script>
/* ============================================================
   KEPT — a quiet, private place for the people you've loved.
   Single-file PWA. Everything lives on this device.
   ============================================================ */
const APP_NAME = "Kept";
/* EGS CORE \u2014 fill in your real BTC / Stripe / PayPal / Wise values below.
   Interac is already your real EGS details. Identical across every app. */
const PAYMENT_CONFIG = {

  interacMemo: 'Kept Donation',
  btc: 'YOUR_BTC_ADDRESS',
  stripe: 'STRIPE_PAYMENT_LINK',
  paypal: 'PAYPAL_DONATE_LINK',
  wise: 'WISE_PAYMENT_LINK'
};
const PAYMENT_TABS = [
  {id:'interac', label:'\ud83c\udfe6 Interac'},
  {id:'btc', label:'\u20bf Bitcoin'},
  {id:'card', label:'\ud83d\udcb3 Credit Card'},
  {id:'paypal', label:'PayPal'},
  {id:'wise', label:'Wise'}
];
let supportTab = 'interac';
const I = {
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>',
  gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a7.7 7.7 0 0 0 0-3l2-1.6-2-3.4-2.4.7a7.7 7.7 0 0 0-2.6-1.5L14 2h-4l-.4 2.7a7.7 7.7 0 0 0-2.6 1.5l-2.4-.7-2 3.4 2 1.6a7.7 7.7 0 0 0 0 3l-2 1.6 2 3.4 2.4-.7a7.7 7.7 0 0 0 2.6 1.5L10 22h4l.4-2.7a7.7 7.7 0 0 0 2.6-1.5l2.4.7 2-3.4-2-1.6z"/></svg>',
  person:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>',
  camera:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L17 8h3v11H4z"/><circle cx="12" cy="13" r="3.2"/></svg>',
  images:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="2"/><path d="M3.5 15.5l4.5-4.5 3 3 4-4.5 5.5 6"/><circle cx="8.5" cy="8.5" r="1.4"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5l5 5M4 20l1-4L16 5l4 4L9 20z"/></svg>',
  download:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13M7 12l5 5 5-5M5 21h14"/></svg>',
  upload:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V8M7 12l5-5 5 5M5 3h14"/></svg>',
  feather:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4c-6 0-14 4-16 14 3-1 6-2 8-4M8 16l8-8"/></svg>',
  chevronR:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>',
  rotate:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v5h-5"/></svg>'
};

const K={people:'kept.people',memories:'kept.memories',settings:'kept.settings'};
function load(k,f){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):f; }catch(e){ return f; } }
function safeSave(key,value){
  const existing=localStorage.getItem(key);
  const isEmpty=value==null||(Array.isArray(value)&&value.length===0);
  if(isEmpty && existing && existing!=='[]' && existing!=='{}'){ return; }
  localStorage.setItem(key,JSON.stringify(value));
  localStorage.setItem(key+'__bak',JSON.stringify(value));
}
function safeLoad(key,fallback){
  try{ const raw=localStorage.getItem(key); if(raw) return JSON.parse(raw);
    const bak=localStorage.getItem(key+'__bak'); if(bak) return JSON.parse(bak);
  }catch(e){}
  return fallback;
}
if(navigator.storage && navigator.storage.persist){ navigator.storage.persisted().then(y=>{ if(!y) navigator.storage.persist(); }); }

let people = safeLoad(K.people,[]);
let memories = safeLoad(K.memories,[]);
let settings = safeLoad(K.settings,{pinHash:null,pinSalt:null});
const persist = {
  people:()=>safeSave(K.people,people),
  memories:()=>safeSave(K.memories,memories),
  settings:()=>safeSave(K.settings,settings)
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function now(){ return Date.now(); }
function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
function personById(id){ return people.find(p=>p.id===id); }

/* ---- IndexedDB photo storage ---- */
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    if(_db) return res(_db);
    const r=indexedDB.open('kept',1);
    r.onupgradeneeded=()=>{ r.result.createObjectStore('photos',{keyPath:'id'}); };
    r.onsuccess=()=>{ _db=r.result; res(_db); };
    r.onerror=()=>rej(r.error);
  });
}
async function photoPut(rec){ const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').put(rec); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); }); }
async function photoGet(id){ const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readonly'); const rq=tx.objectStore('photos').get(id); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>rej(rq.error); }); }
async function photoDel(id){ const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction('photos','readwrite'); tx.objectStore('photos').delete(id); tx.oncomplete=()=>res(true); tx.onerror=()=>rej(tx.error); }); }
async function photoAll(){ const db=await openDB(); return new Promise((res,rej)=>{ const out=[]; const tx=db.transaction('photos','readonly'); const cur=tx.objectStore('photos').openCursor(); cur.onsuccess=e=>{ const c=e.target.result; if(c){ out.push(c.value); c.continue(); } else res(out); }; cur.onerror=()=>rej(cur.error); }); }
const _objUrls=new Map();
async function photoURL(id){
  if(!id) return null;
  if(_objUrls.has(id)) return _objUrls.get(id);
  const rec=await photoGet(id); if(!rec) return null;
  const url=URL.createObjectURL(rec.blob); _objUrls.set(id,url); return url;
}
function downscale(file){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      const max=1000; let w=img.width,h=img.height;
      if(w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      c.toBlob(b=>b?res(b):rej(new Error('encode failed')),'image/jpeg',0.82);
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('bad image')); };
    img.src=url;
  });
}

/* ---- toast ---- */
let toastT=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }

/* ---- router ---- */
let view={name:'home',param:null};
function go(name,param=null){ view={name,param}; render(); window.scrollTo(0,0); }
function goBack(){
  if(view.name==='person'){ go('home'); return; }
  const to=({settings:'home', addMemory:'person', privacy:'settings', support:'settings'})[view.name]||'home';
  go(to);
}

const $app=document.getElementById('app');
const $fab=document.getElementById('fab');

function render(){
  const r=({home:renderHome, person:renderPerson, settings:renderSettings, privacy:renderPrivacy, support:renderSupport})[view.name]||renderHome;
  $app.innerHTML=r(view.param);
  bind();
  hydratePhotos();
  const map={home:()=>openPersonSheet(), person:()=>openMemorySheet(view.param)};
  if(map[view.name]){ $fab.classList.remove('hidden'); $fab.innerHTML=I.plus; $fab.onclick=map[view.name]; }
  else $fab.classList.add('hidden');
}

function renderHome(){
  const head=`<div class="topbar"><div class="grow"><span class="eyebrow">${esc(APP_NAME)}</span><h1>Your People</h1></div>
    <button class="icon-btn" data-go="settings" aria-label="Settings">${I.gear}</button></div>`;
  if(!people.length) return head+`<div class="empty">${I.feather}<div class="t">A quiet place, kept</div><div>Add someone you've loved — their photos and the moments you want close, on your own terms.</div></div>`;
  const sorted=[...people].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  const cards=sorted.map(p=>`<div class="p-card" data-person="${p.id}">
      <div class="p-cover" ${p.cover?`data-cover="${p.cover}"`:''}>${p.cover?'':I.person}</div>
      <div class="p-body"><div class="p-name truncate">${esc(p.name)}</div><div class="p-sub truncate">${esc(p.relation||'')}</div></div>
    </div>`).join('');
  return head+`<div class="wrap"><div class="people-grid">${cards}</div></div>`;
}

function renderPerson(id){
  const p=personById(id); if(!p) return renderHome();
  const mine=memories.filter(m=>m.personId===id).sort((a,b)=>b.createdAt-a.createdAt);
  const photos=(p.photos||[]);
  const dates=[p.born,p.died].filter(Boolean).join(' – ');
  return `<div class="topbar">
    <button class="icon-btn" data-back aria-label="Back">${I.back}</button>
    <div class="grow"></div>
    <button class="icon-btn" data-edit-person="${p.id}" aria-label="Edit">${I.edit}</button>
  </div>
  <div class="wrap">
    <div class="person-cover" ${p.cover?`data-cover="${p.cover}"`:''}>${p.cover?'':I.person}</div>
    <div class="person-name">${esc(p.name)}</div>
    ${(p.relation||dates)?`<div class="person-rel">${esc(p.relation||'')}${p.relation&&dates?' · ':''}${esc(dates)}</div>`:''}

function relDate(ts){
  const d=new Date(ts); const days=Math.floor((Date.now()-ts)/86400000);
  if(days<1) return 'Today';
  if(days<2) return 'Yesterday';
  if(days<30) return days+'d ago';
  return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
}

async function handlePhoto(e,personId){
  const files=e.target.files?Array.from(e.target.files):[]; if(!files.length)return;
  toast(files.length>1?`Saving ${files.length} photos…`:'Saving photo…');
  const p=personById(personId); p.photos=p.photos||[];
  let saved=0;
  for(const file of files){
    try{ const blob=await downscale(file); const id=uid();
      await photoPut({id,blob,personId,createdAt:now()});
      p.photos.push(id); if(!p.cover) p.cover=id; saved++;
    }catch(err){}
  }
  p.updatedAt=now(); persist.people(); render(); e.target.value='';
  toast(saved?'Saved':'Could not save photo');
}

/* ============================================================
   PHOTO GALLERY — pinch-zoom, swipe between photos, rotate
   ============================================================ */
const $viewer=document.getElementById('viewer');
let vw={photos:[],index:0,scale:1,tx:0,ty:0};

function openGallery(personId,photoId){
  let list;
  if(personId){ const p=personById(personId); list=(p&&p.photos)||[]; }
  else{ list=[photoId]; }
  const idx=list.indexOf(photoId);
  vw={photos:list,index:idx<0?0:idx,scale:1,tx:0,ty:0};
  document.body.style.overflow='hidden';
  $viewer.classList.remove('hidden');
  renderGalleryFrame();
}
function closeGallery(){
  $viewer.classList.add('hidden'); $viewer.innerHTML='';
  document.body.style.overflow='';
}
async function renderGalleryFrame(){
  const pid=vw.photos[vw.index]; if(!pid){ closeGallery(); return; }
  vw.scale=1; vw.tx=0; vw.ty=0;
  $viewer.innerHTML=`
    <div class="v-top">
      <button class="icon-btn" data-v-close aria-label="Close">${I.x}</button>
      <span class="v-count">${vw.photos.length>1?(vw.index+1)+' of '+vw.photos.length:''}</span>
      <div class="v-actions"><button class="icon-btn" data-v-rotate aria-label="Rotate photo">${I.rotate}</button></div>
    </div>
    <div class="v-stage" id="v-stage"><img id="v-img" alt="Photo"></div>
    <div class="v-hint">${vw.photos.length>1?'Swipe to browse \u00b7 pinch or double-tap to zoom':'Pinch or double-tap to zoom'}</div>`;
  $viewer.querySelector('[data-v-close]').onclick=closeGallery;
  $viewer.querySelector('[data-v-rotate]').onclick=rotateGalleryPhoto;
  const img=$viewer.querySelector('#v-img');
  const url=await photoURL(pid); if(url) img.src=url;
  bindGalleryGestures();
}
function galleryNav(dir){
  const n=vw.photos.length; if(n<2)return;
  vw.index=(vw.index+dir+n)%n;
  renderGalleryFrame();
}
async function rotateGalleryPhoto(){
  const pid=vw.photos[vw.index]; if(!pid)return;
  toast('Rotating…');
  try{
    const rec=await photoGet(pid); if(!rec) throw new Error('missing');
    const url=URL.createObjectURL(rec.blob);
    const img=new Image();
    await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; img.src=url; });
    const c=document.createElement('canvas'); c.width=img.height; c.height=img.width;
    const ctx=c.getContext('2d');
    ctx.translate(c.width/2,c.height/2); ctx.rotate(Math.PI/2); ctx.drawImage(img,-img.width/2,-img.height/2);
    URL.revokeObjectURL(url);
    const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.9));
    if(!blob) throw new Error('encode failed');
    await photoPut({id:pid,blob,personId:rec.personId,createdAt:rec.createdAt});
    if(_objUrls.has(pid)){ URL.revokeObjectURL(_objUrls.get(pid)); _objUrls.delete(pid); }
    const freshUrl=await photoURL(pid);
    const vimg=$viewer.querySelector('#v-img');
    if(vimg){ vimg.style.transform='translate(0px,0px) scale(1)'; vimg.src=freshUrl; }
    if(view.name==='person') render();
    toast('Rotated');
  }catch(err){ toast('Could not rotate photo'); }
}

function bindGalleryGestures(){
  const stage=document.getElementById('v-stage'), img=document.getElementById('v-img');
  let mode=null;
  let startDist=0,startScale=1,startMidX=0,startMidY=0,startTx=0,startTy=0;
  let startX=0,startY=0,dragDX=0,dragDY=0;
  let lastTapT=0,lastTapX=0,lastTapY=0;
  const dist=t=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
  const mid=t=>({x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2});
  function apply(){ img.style.transform=`translate(${vw.tx}px,${vw.ty}px) scale(${vw.scale})`; }
  function clampPan(){
    const r=stage.getBoundingClientRect();
    const maxX=Math.max(0,(r.width*(vw.scale-1))/2), maxY=Math.max(0,(r.height*(vw.scale-1))/2);
    vw.tx=Math.max(-maxX,Math.min(maxX,vw.tx)); vw.ty=Math.max(-maxY,Math.min(maxY,vw.ty));
  }
  stage.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      mode='pinch'; startDist=dist(e.touches); startScale=vw.scale;
      const r=stage.getBoundingClientRect(); const m=mid(e.touches);
      startMidX=m.x-r.left-r.width/2; startMidY=m.y-r.top-r.height/2;
      startTx=vw.tx; startTy=vw.ty;
    }else if(e.touches.length===1){
      const t=e.touches[0]; startX=t.clientX; startY=t.clientY; dragDX=0; dragDY=0;
      startTx=vw.tx; startTy=vw.ty; mode=vw.scale>1.02?'pan':'swipe';
    }
  },{passive:true});
  stage.addEventListener('touchmove',e=>{
    if(mode==='pinch'&&e.touches.length===2){
      e.preventDefault();
      const r=dist(e.touches)/startDist;
      vw.scale=Math.max(1,Math.min(4,startScale*r));
      vw.tx=startMidX-vw.scale*(startMidX-startTx)/startScale;
      vw.ty=startMidY-vw.scale*(startMidY-startTy)/startScale;
      clampPan(); apply();
    }else if(mode==='pan'&&e.touches.length===1){
      e.preventDefault();
      const t=e.touches[0]; vw.tx=startTx+(t.clientX-startX); vw.ty=startTy+(t.clientY-startY);
      clampPan(); apply();
    }else if(mode==='swipe'&&e.touches.length===1){
      const t=e.touches[0]; dragDX=t.clientX-startX; dragDY=t.clientY-startY;
      if(Math.abs(dragDX)>Math.abs(dragDY)) e.preventDefault();
      img.style.transform=`translate(${dragDX}px,0px) scale(1)`;
    }
  },{passive:false});
  stage.addEventListener('touchend',()=>{
    if(mode==='pinch'){ if(vw.scale<1.02){ vw.scale=1; vw.tx=0; vw.ty=0; apply(); } mode=null; return; }
    if(mode==='pan'){ mode=null; return; }
    if(mode==='swipe'){
      if(Math.abs(dragDX)>60&&Math.abs(dragDX)>Math.abs(dragDY)){
        galleryNav(dragDX<0?1:-1);
      }else{
        img.style.transform='translate(0px,0px) scale(1)';
        const t0=Date.now(), dx=startX-lastTapX, dy=startY-lastTapY;
        if(t0-lastTapT<320&&Math.hypot(dx,dy)<30){
          const r=stage.getBoundingClientRect();
          const ox=startX-r.left-r.width/2, oy=startY-r.top-r.height/2;
          if(vw.scale>1){ vw.scale=1; vw.tx=0; vw.ty=0; }
          else{ vw.scale=2.5; vw.tx=ox*(1-vw.scale); vw.ty=oy*(1-vw.scale); clampPan(); }
          apply(); lastTapT=0;
        }else{ lastTapT=t0; lastTapX=startX; lastTapY=startY; }
      }
      mode=null;
    }
  });
  stage.addEventListener('touchcancel',()=>{ mode=null; });
}

/* ---- sheets ---- */
const $mr=document.getElementById('modal-root');
function closeSheet(){ $mr.innerHTML=''; }
function sheet(html){
  $mr.innerHTML=`<div class="scrim" data-scrim><div class="sheet" role="dialog" aria-modal="true"><div class="grab"></div>${html}</div></div>`;
  $mr.querySelector('[data-scrim]').addEventListener('click',e=>{ if(e.target.hasAttribute('data-scrim')) closeSheet(); });
}

function openPersonSheet(edit=null){
  const p=edit||{};
  sheet(`<h2>${edit?'Edit':'Add someone'}</h2>
    <div class="field"><label>Name</label><input class="input" id="p-name" placeholder="Their name" value="${esc(p.name||'')}"></div>
    <div class="field"><label>Relation (optional)</label><input class="input" id="p-relation" placeholder="e.g. Dad, Grandma, a dear friend" value="${esc(p.relation||'')}"></div>
    <div class="field"><label>Dates (optional)</label>
      <div style="display:flex;gap:10px">
        <input class="input" id="p-born" placeholder="Born, e.g. 1958" value="${esc(p.born||'')}" style="flex:1">
        <input class="input" id="p-died" placeholder="Died, e.g. 2024" value="${esc(p.died||'')}" style="flex:1">
      </div>
    </div>
    <div class="field"><label>A few words (optional)</label><textarea class="input" id="p-note" placeholder="What they meant to you…">${esc(p.note||'')}</textarea></div>
    <button class="btn primary block" id="p-save">${edit?'Save':'Add'}</button>
    ${edit?`<button class="btn danger block" id="p-del" style="margin-top:10px">${I.trash} Remove ${esc(p.name||'')}</button>`:''}`);
  setTimeout(()=>$mr.querySelector('#p-name').focus(),50);
  $mr.querySelector('#p-save').onclick=()=>{
    const name=$mr.querySelector('#p-name').value.trim(); if(!name){$mr.querySelector('#p-name').focus();return;}
    const relation=$mr.querySelector('#p-relation').value.trim();
    const born=$mr.querySelector('#p-born').value.trim();
    const died=$mr.querySelector('#p-died').value.trim();
    const note=$mr.querySelector('#p-note').value.trim();
    if(edit){ edit.name=name; edit.relation=relation; edit.note=note; edit.born=born; edit.died=died; edit.updatedAt=now(); persist.people(); closeSheet(); render(); toast('Saved'); }
    else{ const np={id:uid(),name,relation,note,born,died,photos:[],cover:null,createdAt:now(),updatedAt:now()};
      people.push(np); persist.people(); closeSheet(); go('person',np.id); toast('Added'); }
  };
  if(edit){ $mr.querySelector('#p-del').onclick=async()=>{
    if(!confirm(`Remove ${p.name}? Their photos and memories will be removed too.`))return;
    for(const pid of (p.photos||[])) await photoDel(pid).catch(()=>{});
    people=people.filter(x=>x.id!==p.id); memories=memories.filter(m=>m.personId!==p.id);
    persist.people(); persist.memories(); closeSheet(); go('home'); toast('Removed');
  }; }
}

function openMemorySheet(personId){
  sheet(`<h2>Add a memory</h2>
    <div class="field"><textarea class="input" id="m-text" placeholder="Write whatever comes to mind…" style="min-height:140px" autofocus></textarea></div>
    <div class="field"><label>Shared by (optional)</label><input class="input" id="m-storyteller" placeholder="Name, or leave blank for Anonymous"></div>
    <button class="btn primary block" id="m-save">Save memory</button>`);
  const ta=$mr.querySelector('#m-text'); setTimeout(()=>ta.focus(),50);
  $mr.querySelector('#m-save').onclick=()=>{
    const text=ta.value.trim(); if(!text){ta.focus();return;}
    const storyteller=$mr.querySelector('#m-storyteller').value.trim();
    memories.push({id:uid(),personId,text,storyteller,photo:null,createdAt:now()});
    persist.memories(); closeSheet(); render(); toast('Kept');
  };
}

/* ---- backup ---- */
function blobToB64(blob){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=()=>rej(r.error); r.readAsDataURL(blob); }); }
function b64ToBlob(b64){ const bin=atob(b64); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i); return new Blob([arr],{type:'image/jpeg'}); }
function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

async function exportData(){
  toast('Building backup…');
  const photos=await photoAll();
  const photoData={};
  for(const p of photos){ photoData[p.id]={personId:p.personId,createdAt:p.createdAt,b64:await blobToB64(p.blob)}; }
  const dump={app:'kept',version:1,exportedAt:now(),people,memories,photos:photoData};
  const blob=new Blob([JSON.stringify(dump)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`kept-backup-${todayKey()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('Backup downloaded');
}
async function importData(e){
  const file=e.target.files&&e.target.files[0]; if(!file)return;
  if(!confirm('Restore will REPLACE everything currently in Kept with the backup. Continue?')) return;
  try{
    const text=await file.text(); const d=JSON.parse(text);
    if(d.app!=='kept') throw new Error('Not a Kept backup');
    people=d.people||[]; memories=d.memories||[];
    persist.people(); persist.memories();
    const existing=await photoAll(); for(const p of existing) await photoDel(p.id).catch(()=>{});
    _objUrls.clear();
    for(const [id,p] of Object.entries(d.photos||{})){ await photoPut({id,blob:b64ToBlob(p.b64),personId:p.personId,createdAt:p.createdAt}); }
    go('home'); toast('Backup restored');
  }catch(err){ alert('Could not restore: '+err.message); }
}

/* ---- app lock ---- */
async function sha(text){ const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text)); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''); }
function randSalt(){ return [...crypto.getRandomValues(new Uint8Array(8))].map(b=>b.toString(16).padStart(2,'0')).join(''); }
const $lock=document.getElementById('lock');
function showShell(show){ document.getElementById('app').classList.toggle('hidden',!show); }
function lockGate(){
  if(!settings.pinHash){ $lock.classList.add('hidden'); showShell(true); render(); maybeShowInstallPrompt(); return; }
  showShell(false); $fab.classList.add('hidden');
  $lock.classList.remove('hidden');
  const inp=document.getElementById('lock-pin'); const err=document.getElementById('lock-err');
  inp.value=''; err.textContent=''; setTimeout(()=>inp.focus(),200);
  inp.oninput=async()=>{
    if(inp.value.length<4)return;
    const h=await sha(inp.value+settings.pinSalt);
    if(h===settings.pinHash){ $lock.classList.add('hidden'); showShell(true); render(); maybeShowInstallPrompt(); }
    else{ err.textContent='Wrong PIN'; inp.value=''; }
  };
}

/* ---- Add to Home Screen prompt ---- */
let deferredInstallPrompt=null;
let installPromptShown=false;
function isStandaloneApp(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true; }
function isIOSDevice(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream; }
function appUnlocked(){ return $lock.classList.contains('hidden'); }

window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredInstallPrompt=e;
  maybeShowInstallPrompt();
});
if(isIOSDevice()) setTimeout(maybeShowInstallPrompt,1200);

function maybeShowInstallPrompt(){
  if(installPromptShown||isStandaloneApp()||localStorage.getItem('installPromptDismissed')||!appUnlocked()) return;
  if(deferredInstallPrompt) showInstallBanner('android');
  else if(isIOSDevice()) showInstallBanner('ios');
}
function showInstallBanner(mode){
  if(installPromptShown) return;
  installPromptShown=true;
  const el=document.createElement('div');
  el.id='install-banner';
  el.innerHTML = mode==='android'
    ? `<div class="txt"><b>Add ${esc(APP_NAME)} to your home screen</b>Quick, quiet access \u2014 no app store needed.</div>
       <button class="btn primary sm" id="install-go">Add</button>
       <button class="icon-btn" id="install-x" aria-label="Dismiss" style="width:36px;height:36px;flex:none">${I.x}</button>`
    : `<div class="txt"><b>Add ${esc(APP_NAME)} to your home screen</b>Tap Share, then "Add to Home Screen."</div>
       <button class="icon-btn" id="install-x" aria-label="Dismiss" style="width:36px;height:36px;flex:none">${I.x}</button>`;
  document.body.appendChild(el);
  if(mode==='android'){
    document.getElementById('install-go').onclick=async()=>{
      if(!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt=null;
      dismissInstallBanner();
    };
  }
  document.getElementById('install-x').onclick=dismissInstallBanner;
}
function dismissInstallBanner(){
  const el=document.getElementById('install-banner'); if(el) el.remove();
  localStorage.setItem('installPromptDismissed','1');
}
function setupPin(){
  sheet(`<h2>Set a PIN</h2>
    <div class="field"><label>Choose a 4–8 digit PIN</label><input class="input" id="pin1" type="password" inputmode="numeric" maxlength="8" placeholder="••••"></div>
    <div class="field"><label>Confirm PIN</label><input class="input" id="pin2" type="password" inputmode="numeric" maxlength="8" placeholder="••••"></div>
    <button class="btn primary block" id="pin-save">Save PIN</button>`);
  $mr.querySelector('#pin-save').onclick=async()=>{
    const a=$mr.querySelector('#pin1').value, b=$mr.querySelector('#pin2').value;
    if(a.length<4){ toast('PIN must be at least 4 digits'); return; }
    if(a!==b){ toast("PINs don't match"); return; }
    const salt=randSalt(); settings.pinSalt=salt; settings.pinHash=await sha(a+salt); persist.settings();
    closeSheet(); render(); toast('App lock on');
  };
}

/* ---- service worker ---- */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{})); }

lockGate();
</script>
